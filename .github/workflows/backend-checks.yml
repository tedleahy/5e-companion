name: Backend checks

on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - server/**
      - deploy/**
      - srd-json-files/**
      - .github/scripts/**
      - .github/workflows/backend-checks.yml
      - .github/workflows/deploy-backend.yml
      - bun.lock
      - package.json
  pull_request:
    branches: [main]
    paths:
      - server/**
      - deploy/**
      - srd-json-files/**
      - .github/scripts/**
      - .github/workflows/backend-checks.yml
      - .github/workflows/deploy-backend.yml
      - bun.lock
      - package.json
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workflows:
    name: GitHub Actions (actionlint)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.25'

      - name: Run actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

  server:
    name: Server checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Prisma config requires DATABASE_URL at parse time. These checks do not connect.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Validate Prisma schema
        working-directory: server
        run: bunx prisma validate

      - name: Generate Prisma client
        working-directory: server
        run: bunx prisma generate

      - name: Generate GraphQL types
        working-directory: server
        run: bun run codegen

      - name: Check generated GraphQL types are committed
        run: git diff --exit-code -- server/generated/graphql.ts

      - name: Typecheck server
        working-directory: server
        run: bunx tsc --noEmit

      - name: Run server unit tests
        working-directory: server
        run: bun test

  docker:
    name: API Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Build API image
        run: docker build --pull server
