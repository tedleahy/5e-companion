name: E2E tests

on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - server/**
      - mobile-app/**
      - srd-json-files/**
      - .github/workflows/e2e.yml
      - bun.lock
      - package.json
  pull_request:
    branches: [main]
    paths:
      - server/**
      - mobile-app/**
      - srd-json-files/**
      - .github/workflows/e2e.yml
      - bun.lock
      - package.json
  workflow_dispatch:

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: latest

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: mobile-app/yarn.lock

      - name: Install server dependencies
        working-directory: server
        run: bun install --frozen-lockfile

      - name: Install mobile-app dependencies
        working-directory: mobile-app
        run: yarn install --frozen-lockfile

      - name: Install root dev dependencies (Supabase CLI wrapper)
        run: bun install --frozen-lockfile

      - name: Verify runner Chrome
        run: google-chrome --version

      - name: Start local Supabase
        run: bunx supabase start

      - name: Export DATABASE_URL from local Supabase
        # `server/prisma.config.ts` reads DATABASE_URL at parse time via
        # `env('DATABASE_URL')`, so every `prisma` invocation (including
        # `generate`) needs it set even though generation doesn't actually
        # connect. The Supabase CLI emits it as DB_URL; we rename it to
        # DATABASE_URL so subsequent Prisma steps pick it up.
        run: |
          DB_URL=$(bunx supabase status -o env | grep '^DB_URL=' | cut -d'"' -f2)
          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Generate Prisma client
        working-directory: server
        run: bunx prisma generate

      - name: Run Playwright tests
        working-directory: mobile-app
        env:
          CI: 'true'
        run: yarn e2e

      - name: Stop local Supabase
        if: always()
        run: bunx supabase stop || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: playwright-report
          path: mobile-app/playwright-report/
          retention-days: 14
