name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  mobile:
    name: Mobile (expo lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: mobile-app/yarn.lock

      - name: Install mobile-app dependencies
        working-directory: mobile-app
        run: yarn install --frozen-lockfile

      - name: Run expo lint
        working-directory: mobile-app
        run: yarn expo lint
