<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Empty State</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #f5e6c8;
    --card-bg: #f0e0bc;
    --ink: #1a0f00;
    --ink-light: #3d2b1f;
    --crimson: #8b1a1a;
    --gold: #c9922a;
    --gold-light: #e8b84b;
    --bg: #0d0906;
    --shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #060403;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Crimson Text', Georgia, serif;
  }

  .phone {
    width: 375px; height: 812px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 1px rgba(201,146,42,0.12), 0 40px 80px rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    height: 44px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    position: relative; z-index: 10;
  }
  .status-time { font-family: 'Cinzel', serif; font-size: 12px; color: rgba(245,230,200,0.7); font-weight: 600; }
  .status-icons { font-size: 11px; color: rgba(245,230,200,0.5); }

  /* Atmospheric background illustration */
  .scene {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* SVG illustration area */
  .illustration {
    width: 100%;
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Radial glow behind figure */
  .glow {
    position: absolute;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,146,42,0.06) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -60%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -60%) scale(1.08); }
  }

  /* Decorative rune circle */
  .rune-circle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -58%);
    animation: slowRotate 60s linear infinite;
    opacity: 0.12;
  }
  @keyframes slowRotate {
    from { transform: translate(-50%, -58%) rotate(0deg); }
    to { transform: translate(-50%, -58%) rotate(360deg); }
  }

  /* Floating particles */
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float {
    0% { opacity: 0; transform: translateY(0) scale(1); }
    20% { opacity: 0.6; }
    80% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
  }
  .p1 { left: 42%; top: 55%; animation-delay: 0s; }
  .p2 { left: 55%; top: 48%; animation-delay: 1.2s; width:3px; height:3px; }
  .p3 { left: 38%; top: 42%; animation-delay: 2.4s; }
  .p4 { left: 60%; top: 52%; animation-delay: 0.8s; }
  .p5 { left: 48%; top: 60%; animation-delay: 3s; width:3px; height:3px; }
  .p6 { left: 35%; top: 50%; animation-delay: 1.8s; }

  /* Bottom content area */
  .bottom-content {
    padding: 0 28px 48px;
    text-align: center;
    animation: fadeUp 0.8s ease 0.3s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Ornament divider */
  .ornament {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    justify-content: center;
  }
  .ornament-line {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,146,42,0.35));
  }
  .ornament-line.right {
    background: linear-gradient(270deg, transparent, rgba(201,146,42,0.35));
  }
  .ornament-diamond {
    width: 6px; height: 6px;
    background: rgba(201,146,42,0.5);
    transform: rotate(45deg);
  }

  .heading {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--parchment);
    line-height: 1.2;
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }

  .flavour {
    font-family: 'Crimson Text', serif;
    font-size: 16px;
    font-style: italic;
    color: rgba(245,230,200,0.5);
    line-height: 1.6;
    margin-bottom: 32px;
  }

  .cta-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--crimson);
    border-radius: 14px;
    padding: 16px 28px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    margin-bottom: 14px;
    box-shadow: 0 4px 24px rgba(139,26,26,0.4);
  }
  .cta-btn:hover { background: #a82020; transform: translateY(-1px); }
  .cta-btn:active { transform: translateY(0); }
  .cta-icon { font-size: 16px; }
  .cta-text {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--parchment);
    font-weight: 600;
  }

  .sub-hint {
    font-family: 'Cinzel', serif;
    font-size: 8.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(201,146,42,0.3);
  }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span class="status-time">20:07</span>
    <span class="status-icons">▲ ⬛ 38%</span>
  </div>

  <div class="scene">
    <!-- Glows & particles -->
    <div class="glow"></div>
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>
    <div class="particle p6"></div>

    <!-- Rotating rune circle -->
    <svg class="rune-circle" width="300" height="300" viewBox="0 0 300 300">
      <circle cx="150" cy="150" r="140" fill="none" stroke="rgba(201,146,42,1)" stroke-width="0.8" stroke-dasharray="4 8"/>
      <circle cx="150" cy="150" r="120" fill="none" stroke="rgba(201,146,42,1)" stroke-width="0.5" stroke-dasharray="2 12"/>
      <text font-family="serif" font-size="11" fill="rgba(201,146,42,1)" text-anchor="middle">
        <textPath href="#runeCircle">✦ · CODEX ARCANUM · ✦ · ANNO DOMINI · ✦ · VADE MECUM · ✦ · NOMEN EST OMEN · </textPath>
      </text>
      <defs>
        <path id="runeCircle" d="M 150,150 m -130,0 a 130,130 0 1,1 260,0 a 130,130 0 1,1 -260,0"/>
      </defs>
      <!-- Geometric star inset -->
      <polygon points="150,30 160,145 150,165 140,145" fill="none" stroke="rgba(201,146,42,0.7)" stroke-width="0.6"/>
      <polygon points="150,270 160,155 150,135 140,155" fill="none" stroke="rgba(201,146,42,0.7)" stroke-width="0.6"/>
      <polygon points="30,150 145,160 165,150 145,140" fill="none" stroke="rgba(201,146,42,0.7)" stroke-width="0.6"/>
      <polygon points="270,150 155,160 135,150 155,140" fill="none" stroke="rgba(201,146,42,0.7)" stroke-width="0.6"/>
    </svg>

    <!-- Central figure illustration -->
    <div class="illustration">
      <svg width="200" height="220" viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Staff glow -->
        <ellipse cx="68" cy="180" rx="8" ry="18" fill="rgba(201,146,42,0.06)"/>

        <!-- Robe / cloak body -->
        <path d="M 85 90 Q 60 110 55 160 Q 60 185 100 188 Q 140 185 145 160 Q 140 110 115 90 Z"
              fill="#1a0e06" stroke="rgba(201,146,42,0.2)" stroke-width="1"/>
        <!-- Robe folds -->
        <path d="M 90 95 Q 80 130 78 160" stroke="rgba(201,146,42,0.1)" stroke-width="0.8" fill="none"/>
        <path d="M 110 95 Q 120 130 122 160" stroke="rgba(201,146,42,0.1)" stroke-width="0.8" fill="none"/>

        <!-- Hood/cloak outer -->
        <path d="M 72 75 Q 65 60 75 45 Q 88 28 100 26 Q 112 28 125 45 Q 135 60 128 75 Q 118 88 115 90 Q 100 95 85 90 Z"
              fill="#160d05" stroke="rgba(201,146,42,0.25)" stroke-width="1"/>

        <!-- Face (shadowed) -->
        <ellipse cx="100" cy="58" rx="16" ry="18" fill="#2a1508" opacity="0.8"/>
        <!-- Eyes glowing faintly -->
        <ellipse cx="94" cy="56" rx="3" ry="2" fill="rgba(201,146,42,0.35)"/>
        <ellipse cx="106" cy="56" rx="3" ry="2" fill="rgba(201,146,42,0.35)"/>

        <!-- Staff (left hand) -->
        <line x1="68" y1="185" x2="72" y2="100" stroke="rgba(201,146,42,0.4)" stroke-width="2" stroke-linecap="round"/>
        <!-- Staff orb -->
        <circle cx="72" cy="95" r="5" fill="none" stroke="rgba(201,146,42,0.6)" stroke-width="1.5"/>
        <circle cx="72" cy="95" r="2.5" fill="rgba(201,146,42,0.4)"/>
        <!-- Staff glow aura -->
        <circle cx="72" cy="95" r="9" fill="rgba(201,146,42,0.07)" style="animation: pulse 2s ease-in-out infinite"/>

        <!-- Book (right hand) -->
        <rect x="118" y="118" width="22" height="28" rx="2"
              fill="#1a0e06" stroke="rgba(201,146,42,0.35)" stroke-width="1"/>
        <line x1="129" y1="119" x2="129" y2="145" stroke="rgba(201,146,42,0.2)" stroke-width="0.8"/>
        <!-- Book pages hint -->
        <line x1="120" y1="124" x2="128" y2="124" stroke="rgba(201,146,42,0.15)" stroke-width="0.5"/>
        <line x1="120" y1="128" x2="128" y2="128" stroke="rgba(201,146,42,0.15)" stroke-width="0.5"/>
        <line x1="120" y1="132" x2="128" y2="132" stroke="rgba(201,146,42,0.15)" stroke-width="0.5"/>
        <line x1="130" y1="124" x2="138" y2="124" stroke="rgba(201,146,42,0.15)" stroke-width="0.5"/>
        <line x1="130" y1="128" x2="138" y2="128" stroke="rgba(201,146,42,0.15)" stroke-width="0.5"/>

        <!-- Hem of robe -->
        <path d="M 55 175 Q 60 190 100 192 Q 140 190 145 175"
              stroke="rgba(201,146,42,0.15)" stroke-width="1" fill="none"/>

        <!-- Shadow on ground -->
        <ellipse cx="100" cy="195" rx="38" ry="6" fill="rgba(0,0,0,0.35)"/>
      </svg>
    </div>

    <!-- Bottom text + CTA -->
    <div class="bottom-content">
      <div class="ornament">
        <div class="ornament-line"></div>
        <div class="ornament-diamond"></div>
        <div class="ornament-line right"></div>
      </div>

      <div class="heading">Your legend<br>has yet to begin.</div>
      <div class="flavour">
        "Every great tale starts with a single name<br>scratched into the pages of fate."
      </div>

      <div class="cta-btn">
        <span class="cta-icon">✦</span>
        <span class="cta-text">Create your first character</span>
      </div>

      <div class="sub-hint">Character Codex · Ready when you are</div>
    </div>
  </div>
</div>
</body>
</html>
