type Spell {
    id: ID!
    name: String!
    level: Int!
    schoolIndex: String!
    classIndexes: [String!]!
    description: [String!]!
    higherLevel: [String!]!
    range: String
    components: [String!]!
    material: String
    ritual: Boolean!
    duration: String
    concentration: Boolean!
    castingTime: String!
    sourceBook: String
}

input SpellFilter {
    name: String
    levels: [Int]
    classes: [String]
    ritual: Boolean
    hasHigherLevel: Boolean
    rangeCategories: [String]
    components: [String]
    hasMaterial: Boolean
    concentration: Boolean
    durationCategories: [String]
    castingTimeCategories: [String]
}

input SpellPagination {
    limit: Int
    offset: Int
}

# ---------------------------------------------------------------------------
# Character Sheet
# ---------------------------------------------------------------------------

type Character {
    id: ID!
    name: String!
    race: String!
    class: String!
    subclass: String
    level: Int!
    alignment: String!
    background: String!
    proficiencyBonus: Int!
    inspiration: Boolean!
    ac: Int!
    speed: Int!
    initiative: Int!
    spellcastingAbility: String
    spellSaveDC: Int
    spellAttackBonus: Int
    conditions: [String!]!
    notes: String!
    stats: CharacterStats
    weapons: [Attack!]!
    attacks: [Attack!]!
    inventory: [InventoryItem!]!
    features: [CharacterFeature!]!
    spellSlots: [SpellSlot!]!
    spellbook: [CharacterSpell!]!
}

type CharacterStats {
    id: ID!
    abilityScores: AbilityScores!
    hp: HP!
    deathSaves: DeathSaves!
    hitDice: HitDice!
    savingThrowProficiencies: [String!]!
    skillProficiencies: SkillProficiencies!
    traits: Traits!
    currency: Currency!
}

type AbilityScores {
    strength: Int!
    dexterity: Int!
    constitution: Int!
    intelligence: Int!
    wisdom: Int!
    charisma: Int!
}

type HP {
    current: Int!
    max: Int!
    temp: Int!
}

type DeathSaves {
    successes: Int!
    failures: Int!
}

type HitDice {
    total: Int!
    remaining: Int!
    die: String!
}

enum ProficiencyLevel {
    none
    proficient
    expert
}

type SkillProficiencies {
    acrobatics: ProficiencyLevel!
    animalHandling: ProficiencyLevel!
    arcana: ProficiencyLevel!
    athletics: ProficiencyLevel!
    deception: ProficiencyLevel!
    history: ProficiencyLevel!
    insight: ProficiencyLevel!
    intimidation: ProficiencyLevel!
    investigation: ProficiencyLevel!
    medicine: ProficiencyLevel!
    nature: ProficiencyLevel!
    perception: ProficiencyLevel!
    performance: ProficiencyLevel!
    persuasion: ProficiencyLevel!
    religion: ProficiencyLevel!
    sleightOfHand: ProficiencyLevel!
    stealth: ProficiencyLevel!
    survival: ProficiencyLevel!
}

type Traits {
    personality: String!
    ideals: String!
    bonds: String!
    flaws: String!
    armorProficiencies: [String!]
    weaponProficiencies: [String!]
    toolProficiencies: [String!]
    languages: [String!]
}

type Currency {
    cp: Int!
    sp: Int!
    ep: Int!
    gp: Int!
    pp: Int!
}

type Attack {
    id: ID!
    name: String!
    attackBonus: String!
    damage: String!
    type: String!
}

type InventoryItem {
    id: ID!
    name: String!
    quantity: Int!
    weight: Float
    description: String
    equipped: Boolean!
    magical: Boolean!
}

type CharacterFeature {
    id: ID!
    name: String!
    source: String!
    description: String!
    usesMax: Int
    usesRemaining: Int
    recharge: String
}

type SpellSlot {
    id: ID!
    level: Int!
    total: Int!
    used: Int!
}

type CharacterSpell {
    spell: Spell!
    prepared: Boolean!
}

